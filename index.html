<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <title>Form flex</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>CREATE AN ACCOUNT</h1>
      <h2>We always keep your name and email address private.</h2>
      <form action="">
        <div class="input-flex">
          <input type="text" placeholder="First name" />
          <input type="text" placeholder="Last name" />
          <input type="text" placeholder="Display name" />
          <input type="text" placeholder="Email Address" />
          <input type="text" placeholder="Password" />
          <input type="text" placeholder="Password Confirmation" />
        </div>
        <div class="options">
          <input type="radio" id="Buyer" class="radio-button" name="type" />
          <div>
            <label for="Buyer">Join As a Buyer</label>
            <p>
              I am looking for a Name, Logo or Tagline for my business, brand or
              product.
            </p>
          </div>
        </div>
        <div class="options">
          <input type="radio" id="Seller" class="radio-button" name="type" />
          <div>
            <label for="Seller">Join As a Creative or Marketplace seller</label>
            <p>
              I plan to submit name ideas, Logo designs or sell names in Domain
              Marketplace.
            </p>
          </div>
        </div>
        <div class="marketing">
          <input type="checkbox" id="Marketing" />
          <label for="Marketing">
            Allow Squadhelp to send marketing/promotional offers from time to
            time
          </label>
        </div>
        <input class="btn" type="submit" value="Create account" />
      </form>
    </div>
  </body>
</html>
